<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>whoisolivasx - Análisis de Tráfico SEO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --container-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-dim: #aaaaaa;
            --accent: #ff0000;
            --border: #3f3f3f;
            --sidebar-space: 140px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            background: var(--bg-color); 
            padding: 20px 40px 20px var(--sidebar-space); 
            color: var(--text-main); 
            overflow-x: hidden;
        }

        .container { 
            width: calc(100% - 10px);
            max-width: 1800px; 
            background: var(--container-bg); 
            padding: 30px; border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); 
            margin: 0 auto;
        }

        h1 { color: var(--accent); text-align: center; margin-bottom: 5px; font-weight: 800; text-transform: uppercase; }
        .subtitle { text-align: center; color: var(--text-dim); margin-bottom: 30px; font-size: 0.95em; }

        .controls { 
            display: grid; 
            grid-template-columns: 2fr 1fr; 
            gap: 15px; 
            margin-bottom: 30px; 
        }
        
        .upload-section { 
            border: 2px dashed var(--border); padding: 20px; text-align: center; 
            border-radius: 12px; cursor: pointer; background: #2a2a2a; color: var(--text-dim);
            transition: 0.3s;
        }
        .upload-section:hover { border-color: var(--accent); color: white; }

        .copy-btn {
            background: var(--accent); color: white; border: none; border-radius: 12px;
            font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 0.9rem;
        }
        .copy-btn:hover { background: #cc0000; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,0,0,0.3); }

        /* Ajuste a 1 columna para que las gráficas de tiempo sean anchas y legibles */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: #2a2a2a; 
            padding: 20px; 
            border-radius: 15px; 
            border: 1px solid var(--border);
            height: 400px; /* Altura fija para evitar que se alargue */
            display: flex;
            flex-direction: column;
        }

        .canvas-wrapper {
            position: relative;
            flex-grow: 1; 
            width: 100%;
            height: 100%;
        }

        .table-wrapper { 
            overflow-x: auto; max-height: 400px; border: 1px solid var(--border); 
            border-radius: 12px; background: #2a2a2a; margin-top: 20px;
        }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { background: #333; position: sticky; top: 0; padding: 12px; text-align: left; color: var(--accent); z-index: 10; }
        td { padding: 10px; border-bottom: 1px solid var(--border); color: var(--text-dim); }
        tr:hover td { background: #353535; color: white; }

        #tabsContainer { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; }
        .tab-btn {
            background: #333; color: #888; border: none; padding: 8px 15px; 
            border-radius: 8px; cursor: pointer; font-size: 0.8rem; transition: 0.3s;
        }
        .tab-btn.active { background: var(--accent); color: white; }
        .tab-btn:hover:not(.active) { background: #444; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>Fuentes de Tráfico</h1>
    <p class="subtitle">Análisis Estratégico de Descubrimiento | whoisolivasx</p>

    <div class="controls">
        <div class="upload-section" id="dropZone">
            <span>📁 Arrastrar Reporte de Tráfico de YouTube (.xlsx)</span>
            <input type="file" id="fileInput" accept=".xlsx" style="display: none;">
        </div>
        <button class="copy-btn" id="copyAiBtn" style="display:none;" onclick="copyForAI()">🚀 ANALIZAR CON CONSULTOR IA</button>
    </div>

    <div class="dashboard-grid" id="dashboardSection" style="display:none;">
        <div class="card">
            <h3 style="color: var(--accent); margin-bottom: 15px; font-size: 0.9rem;">TOP 5 FUENTES DE TRÁFICO A LO LARGO DEL TIEMPO</h3>
            <div class="canvas-wrapper">
                <canvas id="sourcesTimeChart"></canvas>
            </div>
        </div>
        <div class="card">
            <h3 style="color: var(--accent); margin-bottom: 15px; font-size: 0.9rem;">TENDENCIA TEMPORAL (TOTAL GENERAL)</h3>
            <div class="canvas-wrapper">
                <canvas id="lineChart"></canvas>
            </div>
        </div>
    </div>

    <div id="tabsContainer"></div>

    <div id="tableArea" class="table-wrapper">
        <div style="text-align:center; padding:100px; color:var(--text-dim);">Sube los datos para activar el radar de tráfico.</div>
    </div>
</div>

<script src="menufijo.js"></script>

<script>
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    let workbookData = {};
    let charts = { sourcesTime: null, line: null };

    dropZone.onclick = () => fileInput.click();

    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = '#ff0000';
        dropZone.style.background = '#3a1a1a';
    });

    dropZone.addEventListener('dragleave', () => {
        dropZone.style.borderColor = 'var(--border)';
        dropZone.style.background = 'var(--card-bg)';
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = 'var(--border)';
        dropZone.style.background = 'var(--card-bg)';
        
        const file = e.dataTransfer.files[0];
        if (file && file.name.endsWith('.xlsx')) {
            processExcel(file);
        } else {
            alert('Por favor, arrastra un archivo .xlsx válido.');
        }
    });

    function processExcel(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array', raw: false });
            
            workbookData = {};
            workbook.SheetNames.forEach(name => {
                const cleanName = name.replace(" (Tabla)", "");
                workbookData[cleanName] = XLSX.utils.sheet_to_json(workbook.Sheets[name], { header: 1 });
            });

            createTabs();
            renderCharts();
            switchSheet(Object.keys(workbookData)[0]);
            
            document.getElementById('dashboardSection').style.display = 'grid';
            document.getElementById('copyAiBtn').style.display = 'block';
        };
        reader.readAsArrayBuffer(file);
    }

    function createTabs() {
        const container = document.getElementById('tabsContainer');
        container.innerHTML = '';
        Object.keys(workbookData).forEach(name => {
            const btn = document.createElement('button');
            btn.className = 'tab-btn';
            btn.innerText = name;
            btn.onclick = () => switchSheet(name, btn);
            container.appendChild(btn);
        });
        if(container.firstChild) container.firstChild.classList.add('active');
    }

    function switchSheet(name, btn) {
        if(btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        renderTable(workbookData[name]);
    }

    function renderTable(data) {
        if (!data || data.length === 0) return;
        let html = '<table><thead><tr>';
        data[0].forEach(h => html += `<th>${h || ''}</th>`);
        html += '</tr></thead><tbody>';
        
        for (let i = 1; i < data.length; i++) {
            if(data[i].length > 0 && data[i][0]) {
                html += '<tr>';
                data[i].forEach(cell => html += `<td>${cell !== undefined ? cell : '0'}</td>`);
                html += '</tr>';
            }
        }
        document.getElementById('tableArea').innerHTML = html + '</tbody></table>';
    }

    function renderCharts() {
        // 1. Gráfico de Tiempo por Fuentes (Top 5)
        const chartDataSheet = workbookData["Datos del gráfico"];
        const tableDataSheet = workbookData["Datos de la tabla"];

        if (chartDataSheet && tableDataSheet) {
            const ctxTime = document.getElementById('sourcesTimeChart').getContext('2d');
            if (charts.sourcesTime) charts.sourcesTime.destroy();

            // Extraer las 5 fuentes principales de la tabla general (ignorando 'Total')
            const topSources = tableDataSheet.slice(1)
                .filter(r => r.length > 0 && r[0] && r[0] !== 'Total')
                .sort((a, b) => {
                    let valA = parseFloat(String(a[1]).replace(/,/g, '')) || 0;
                    let valB = parseFloat(String(b[1]).replace(/,/g, '')) || 0;
                    return valB - valA;
                })
                .slice(0, 5) // TOP 5
                .map(r => r[0]);

            const validRows = chartDataSheet.slice(1).filter(r => r.length > 0 && r[0] && r[1]);
            const dates = [...new Set(validRows.map(r => r[0]))].sort();

            const colors = ['#ff0000', '#87CEEB', '#FFD700', '#32CD32', '#FF69B4'];
            const datasets = topSources.map((source, index) => {
                const dataPts = dates.map(date => {
                    const row = validRows.find(r => r[0] === date && r[1] === source);
                    if (row) {
                        let val = String(row[2]).replace(/,/g, '');
                        return parseFloat(val) || 0;
                    }
                    return 0;
                });
                return {
                    label: source,
                    data: dataPts,
                    borderColor: colors[index],
                    backgroundColor: 'transparent',
                    borderWidth: 2,
                    tension: 0.4,
                    pointRadius: 2,
                    pointHoverRadius: 6
                };
            });

            charts.sourcesTime = new Chart(ctxTime, {
                type: 'line',
                data: { labels: dates, datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: { 
                        legend: { position: 'top', labels: { color: '#fff', font: { size: 12 } } },
                        tooltip: { backgroundColor: 'rgba(20,20,20,0.9)', titleColor: '#fff', bodyColor: '#aaa' }
                    },
                    scales: {
                        x: { ticks: { color: '#888', maxTicksLimit: 15 }, grid: { color: 'rgba(255,255,255,0.05)' } },
                        y: { ticks: { color: '#888' }, grid: { color: 'rgba(255,255,255,0.05)' }, beginAtZero: true }
                    }
                }
            });
        }

        // 2. Gráfico de Líneas (Totales)
        const totalData = workbookData["Totales"];
        if (totalData) {
            const ctxLine = document.getElementById('lineChart').getContext('2d');
            if (charts.line) charts.line.destroy();

            const validRows = totalData.slice(1).filter(r => r.length > 0 && r[0]);
            const labels = validRows.map(r => r[0]);
            
            const views = validRows.map(r => {
                let val = r[1];
                if (typeof val === 'string') val = val.replace(/,/g, '');
                return parseFloat(val) || 0;
            });

            charts.line = new Chart(ctxLine, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Total de Visualizaciones',
                        data: views,
                        borderColor: '#ff0000',
                        backgroundColor: 'rgba(255,0,0,0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 2,
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: { 
                        legend: { display: false },
                        tooltip: { backgroundColor: 'rgba(20,20,20,0.9)', titleColor: '#fff', bodyColor: '#aaa' }
                    },
                    scales: {
                        x: { ticks: { color: '#888', maxTicksLimit: 15 }, grid: { color: 'rgba(255,255,255,0.05)' } },
                        y: { ticks: { color: '#888' }, grid: { color: 'rgba(255,255,255,0.05)' }, beginAtZero: true }
                    }
                }
            });
        }
    }

    function copyForAI() {
        if (Object.keys(workbookData).length === 0) {
            alert("Por favor, sube un archivo primero.");
            return;
        }

        let promptText = `Actúa como un Especialista en Algoritmos de YouTube, Consultor SEO de Alto Nivel y Estratega de Contenido.
            Analiza detalladamente los siguientes datos de "Fuentes de Tráfico" de mi canal "whoisolivasx". Mi formato principal son videoensayos profundos, reflexivos y con tintes filosóficos y estoicos.

            Los datos adjuntos contienen el desglose de tráfico (Visualizaciones, Tiempo, Impresiones, CTR), la evolución temporal de las fuentes y los totales generales diarios.

            TU OBJETIVO Y ENTREGABLES:
            1. Diagnóstico del Algoritmo (Exploración vs. Búsqueda): Analiza el balance entre "Funciones de exploración", "Vídeos sugeridos" y "Búsqueda de YouTube". Para un canal de videoensayos, ¿es saludable mi distribución de tráfico? ¿Qué me dice esto sobre cómo el algoritmo de YouTube está recomendando mi contenido?
            2. Calidad del Tráfico (Impresiones + CTR vs. Retención): En la hoja "Datos de la tabla", cruza el CTR con el "Tiempo de visualización". ¿Existe alguna fuente con un CTR bajo pero que aporte muchísimo tiempo de visualización? (Si es así, significa que mi "empaque" o miniatura falla, pero el contenido es excelente y retiene). ¿Cómo soluciono esto?
            3. Sinergia Shorts vs. Long-form: Observa el rendimiento del "Feed de Shorts" frente a "Páginas del canal" o "Funciones de exploración". ¿Los Shorts me están sirviendo como un buen embudo para atraer espectadores a mis videos largos, o están aislando a la audiencia? Dame 2 tácticas para convertir a un espectador de Shorts rápidos en un consumidor fiel de videoensayos.
            4. Estrategia de "Packaging": Basado en la fuente de tráfico que me da más Impresiones totales, dame 3 lineamientos claros para diseñar mis próximos títulos y miniaturas para maximizar los clics sin caer en el clickbait barato ni perder mi tono serio.

            Responde de forma ejecutiva, usando viñetas y con un lenguaje técnico pero altamente accionable para aplicarlo en mi próximo video.

            AQUÍ ESTÁN LOS DATOS DE TRÁFICO DE MI CANAL:
            `;

        let fullText = promptText;
        
        // Extraemos los datos de TODAS las hojas
        for (let sheetName in workbookData) {
            fullText += `\n\n--- [HOJA: ${sheetName}] ---\n`;
            workbookData[sheetName].forEach(row => {
                if(row.length > 0 && row[0]) {
                    fullText += row.join("\t") + "\n";
                }
            });
        }

        navigator.clipboard.writeText(fullText).then(() => {
            alert("🚀 ¡PROMPT DE TRÁFICO COPIADO! Pégalo en Gemini para hackear el algoritmo de recomendación.");
        });
    }
</script>
</body>
</html>
