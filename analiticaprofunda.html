<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>whoisolivasx - Analítica Profunda</title>

    <link rel="icon" type="image/png" href="olivaslogo.png">   
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --container-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-dim: #aaaaaa;
            --accent: #ff0000;
            --accent-hover: #cc0000;
            --card-bg: #2a2a2a;
            --border: #3f3f3f;
            --sidebar-space: 140px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            background: var(--bg-color); 
            width: 100vw;
            min-height: 100vh;
            padding: 20px 20px 20px var(--sidebar-space); 
            color: var(--text-main); 
            overflow-x: hidden;
        }

        .container { 
            width: calc(100% - 10px);
            max-width: 1800px; 
            background: var(--container-bg); 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); 
            margin: 0 auto;
            overflow: hidden; 
        }

        h1 { color: var(--accent); text-align: center; margin-bottom: 5px; font-weight: 800; }
        .subtitle { text-align: center; color: var(--text-dim); margin-bottom: 30px; font-size: 0.95em; }

        .controls { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 15px; 
            margin-bottom: 30px; 
        }
        
        .upload-section { 
            border: 2px dashed var(--border); 
            padding: 10px; 
            text-align: center; 
            border-radius: 12px; 
            cursor: pointer; 
            background: var(--card-bg); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: var(--text-dim);
            font-size: 0.8rem;
        }

        .input-group {
            background: var(--card-bg); 
            padding: 8px 15px; 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            display: flex; 
            flex-direction: column;
        }
        .input-group label { font-size: 0.6rem; color: var(--accent); font-weight: bold; text-transform: uppercase; }
        .input-group input { background: transparent; border: none; color: white; outline: none; font-size: 0.9rem; margin-top: 2px; }

        .btn-base { 
            border: none; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            display: none; 
            font-size: 0.8rem; 
            height: 45px;
        }

        .ai-button { background: var(--accent); color: white; }
        .toggle-button { background: var(--card-bg); color: white; border: 1px solid var(--border); }

        .chart-container { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 15px; 
            margin-bottom: 30px; 
            border: 1px solid var(--border); 
            height: 480px; 
            width: 100%;
            display: none;
        }

        #tabsContainer { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .tab-button { 
            padding: 6px 14px; 
            border: 1px solid var(--border); 
            background: var(--card-bg); 
            color: var(--text-dim); 
            cursor: pointer; 
            border-radius: 20px; 
            font-size: 0.75rem; 
        }
        .tab-button.active { background: var(--accent); color: white; border-color: var(--accent); }

        .table-wrapper { 
            overflow-x: auto; 
            max-height: 500px; 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            background: var(--card-bg);
            width: 100%;
        }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { background: #333; position: sticky; top: 0; padding: 12px; text-align: left; color: var(--accent); z-index: 10; }
        td { padding: 10px; border-bottom: 1px solid var(--border); color: var(--text-dim); }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Proyecto Barcina</h1>
    <p class="subtitle">Sincronización Total: Gráfica + Tabla | whoisolivasx</p>

    <div class="controls">
        <div class="upload-section" id="dropZone">
            <span>📁 Reporte .xlsx</span>
            <input type="file" id="fileInput" accept=".xlsx" style="display: none;">
        </div>

        <div class="input-group">
            <label>Duración (MM:SS)</label>
            <input type="text" id="videoDuration" placeholder="10:00" value="10:00">
        </div>

        <button id="copyAiBtn" class="btn-base ai-button" onclick="copyAllDataForAI()">
            COPIAR IA
        </button>

        <button id="toggleViewBtn" class="btn-base toggle-button" onclick="toggleDisplayMode()">
            Ver: Minutos ⏱️
        </button>
    </div>

    <div id="chartWrapper" class="chart-container">
        <canvas id="retentionChart"></canvas>
    </div>

    <div id="tabsContainer"></div>

    <div id="tableArea" class="table-wrapper">
        <div class="empty-state" style="text-align:center; padding:100px; color:var(--text-dim);">Carga un archivo para comenzar.</div>
    </div>
</div>

<script src="menufijo.js"></script>

<script>
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const tabsContainer = document.getElementById('tabsContainer');
    const tableArea = document.getElementById('tableArea');
    const copyAiBtn = document.getElementById('copyAiBtn');
    const toggleBtn = document.getElementById('toggleViewBtn');
    const chartWrapper = document.getElementById('chartWrapper');
    const durationInput = document.getElementById('videoDuration');

    let workbookData = {}; 
    let currentChart = null;
    let currentSheet = "";
    let displayMode = 'time'; 

    dropZone.onclick = () => fileInput.click();

    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = '#ff0000';
        dropZone.style.background = '#3a1a1a';
    });

    dropZone.addEventListener('dragleave', () => {
        dropZone.style.borderColor = 'var(--border)';
        dropZone.style.background = 'var(--card-bg)';
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = 'var(--border)';
        dropZone.style.background = 'var(--card-bg)';
        
        const file = e.dataTransfer.files[0];
        if (file && file.name.endsWith('.xlsx')) {
            processExcel(file);
        } else {
            alert('Por favor, arrastra un archivo .xlsx válido.');
        }
    });

    durationInput.oninput = () => {
        if(currentSheet) {
            updateChart(currentSheet, workbookData[currentSheet]);
            renderTable(workbookData[currentSheet]);
        }
    };

    function toggleDisplayMode() {
        displayMode = (displayMode === 'time') ? 'percent' : 'time';
        toggleBtn.innerText = (displayMode === 'time') ? 'Ver: Minutos ⏱️' : 'Ver: Porcentaje %';
        if(currentSheet) {
            updateChart(currentSheet, workbookData[currentSheet]);
            renderTable(workbookData[currentSheet]);
        }
    }

    function processExcel(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            workbookData = {};
            tabsContainer.innerHTML = '';
            
            workbook.SheetNames.forEach((name, index) => {
                const worksheet = workbook.Sheets[name];
                workbookData[name] = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                const btn = document.createElement('button');
                btn.className = 'tab-button' + (index === 0 ? ' active' : '');
                btn.innerText = name;
                btn.onclick = () => switchSheet(name, btn);
                tabsContainer.appendChild(btn);
            });

            if (workbook.SheetNames.length > 0) {
                switchSheet(workbook.SheetNames[0], tabsContainer.firstChild);
                copyAiBtn.style.display = 'block';
                toggleBtn.style.display = 'block';
                chartWrapper.style.display = 'block';
            }
        };
        reader.readAsArrayBuffer(file);
    }

    function switchSheet(name, clickedBtn) {
        currentSheet = name;
        document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
        clickedBtn.classList.add('active');
        renderTable(workbookData[name]);
        updateChart(name, workbookData[name]);
    }

    function durationToSeconds(val) {
        if (!val.includes(':')) return parseFloat(val) || 0;
        const parts = val.split(':');
        return (parseInt(parts[0]) * 60) + parseInt(parts[1]);
    }

    function formatTime(seconds) {
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        return `${m}:${s.toString().padStart(2, '0')}`;
    }

    function renderTable(data) {
        if (!data || data.length === 0) return;
        const totalSeconds = durationToSeconds(durationInput.value);
        
        let html = '<table><thead><tr>';
        html += `<th>${displayMode === 'time' ? 'Tiempo (MM:SS)' : 'Momento (%)'}</th>`;
        for(let j=1; j < data[0].length; j++) {
            html += `<th>${data[0][j] || ''}</th>`;
        }
        html += '</tr></thead><tbody>';

        for (let i = 1; i < data.length; i++) {
            html += '<tr>';
            const percentage = parseFloat(data[i][0]);
            
            if (displayMode === 'time') {
                const pointSeconds = (percentage / 100) * totalSeconds;
                html += `<td style="color: var(--accent); font-weight: bold;">${formatTime(pointSeconds)}</td>`;
            } else {
                html += `<td style="color: var(--accent); font-weight: bold;">${percentage}%</td>`;
            }

            for(let j=1; j < data[i].length; j++) {
                html += `<td>${data[i][j] !== undefined ? data[i][j] : ''}</td>`;
            }
            html += '</tr>';
        }
        html += '</tbody></table>';
        tableArea.innerHTML = html;
    }

    function updateChart(sheetName, data) {
        const ctx = document.getElementById('retentionChart').getContext('2d');
        if (currentChart) currentChart.destroy();

        const totalSeconds = durationToSeconds(durationInput.value);
        
        const labels = data.slice(1).map(row => {
            const percentage = parseFloat(row[0]);
            if (displayMode === 'percent') return percentage + '%';
            return formatTime((percentage / 100) * totalSeconds);
        });

        const values = data.slice(1).map(row => parseFloat(row[row.length - 1])); 

        currentChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Retención de audiencia',
                    data: values,
                    borderColor: '#ff0000',
                    backgroundColor: 'rgba(255, 0, 0, 0.15)',
                    borderWidth: 3,
                    fill: true,
                    tension: 0.3,
                    pointRadius: 2,
                    pointHoverRadius: 6,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    tooltip: {
                        callbacks: {
                            title: (items) => (displayMode === 'time' ? 'Tiempo: ' : 'Progreso: ') + items[0].label,
                            label: (context) => `Retención: ${context.raw}%`
                        }
                    },
                    legend: { display: false }
                },
                scales: {
                    x: { ticks: { color: '#888', maxTicksLimit: 15 }, grid: { color: 'rgba(255,255,255,0.05)' } },
                    y: { ticks: { color: '#888', callback: (v) => v + '%' }, grid: { color: 'rgba(255,255,255,0.05)' }, min: 0, max: 100 }
                }
            }
        });
    }

    function copyAllDataForAI() {
        const duration = durationInput.value;
        
        let promptText = `Actúa como un Estratega Experto en Retención de Audiencia, Guionismo y SEO en YouTube. 
            Analiza detalladamente los siguientes datos de retención de un video individual de mi canal "whoisolivasx", el cual se enfoca en videoensayos y análisis profundos. 
            La duración total de este video es de ${duration} (MM:SS).

            Los datos adjuntos incluyen la retención absoluta a lo largo del video (en porcentajes del 0 al 100), actividad detallada (dónde inician y detienen la reproducción la audiencia), y el comportamiento segmentado (Suscritos vs No Suscritos, Nuevos vs Recurrentes, Orgánico vs Pagado).

            TU OBJETIVO Y ENTREGABLES:
            1. Análisis del Gancho (Primeros 30 segundos / 0-10%): Analiza la caída inicial. ¿Qué porcentaje exacto de audiencia perdí al inicio? Diagnostica si mi gancho fue débil y dame 2 tácticas de guion (hook strategies) para retener más en el próximo video.
            2. Puntos Críticos de Abandono (Drop-offs): Identifica los 2 o 3 momentos exactos (en porcentaje y tiempo aproximado) donde hay caídas bruscas o donde "detuvieron la reproducción". ¿A qué se deben usualmente estas fugas en videoensayos (ej. mucha exposición, transiciones lentas, falta de cambio visual)?
            3. Análisis de Lealtad (Suscritos vs No Suscritos / Nuevos vs Recurrentes): Compara el comportamiento de estos segmentos. ¿Los no suscriptores abandonan mucho antes? Si es así, ¿qué estrategia me recomiendas para convertirlos en suscriptores antes de que se vayan?
            4. Picos de Re-visualización: Revisa la hoja de "Actividad Detallada". ¿Hay algún momento donde la retención se mantenga plana o suba (iniciaron la reproducción)? Esto indica un momento altamente interesante. ¿Cómo puedo replicar ese éxito en futuros guiones?
            5. Plan de Acción de Edición y Guion: Basado en esta gráfica, dame 3 instrucciones directas y accionables que debo darle a mi editor o aplicar en mi próximo guion para mejorar el AVD (Duración Promedio de Reproducción).

            Responde de forma ejecutiva, sin rodeos, usando viñetas y dirigiéndote a mí como un consultor experto.

            AQUÍ ESTÁN LOS DATOS DEL VIDEO:
            `;

        let fullText = promptText;
        for (let sheetName in workbookData) {
            fullText += `\n\n--- [HOJA: ${sheetName}] ---\n`;
            fullText += workbookData[sheetName].map(r => r.join("\t")).join("\n");
        }
        
        navigator.clipboard.writeText(fullText).then(() => {
            alert("¡PROMPT DE RETENCIÓN COPIADO! Pégalo en Gemini para recibir tu consultoría de guion y edición.");
        });
    }
</script>
</body>
</html>
