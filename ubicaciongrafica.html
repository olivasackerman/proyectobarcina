<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>whoisolivasx - Geografía y Mercados</title>

    <link rel="icon" type="image/png" href="olivaslogo.png">   
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --container-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-dim: #aaaaaa;
            --accent: #ff0000;
            --border: #3f3f3f;
            --sidebar-space: 140px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            background: var(--bg-color); 
            padding: 20px 40px 20px var(--sidebar-space); 
            color: var(--text-main); 
            overflow-x: hidden;
        }

        .container { 
            width: calc(100% - 10px);
            max-width: 1800px; 
            background: var(--container-bg); 
            padding: 30px; border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); 
            margin: 0 auto;
        }

        h1 { color: var(--accent); text-align: center; margin-bottom: 5px; font-weight: 800; text-transform: uppercase; }
        .subtitle { text-align: center; color: var(--text-dim); margin-bottom: 30px; font-size: 0.95em; }

        .controls { display: grid; grid-template-columns: 2fr 1fr; gap: 15px; margin-bottom: 30px; }
        
        .upload-section { 
            border: 2px dashed var(--border); padding: 20px; text-align: center; 
            border-radius: 12px; cursor: pointer; background: #2a2a2a; color: var(--text-dim); transition: 0.3s;
        }
        .upload-section:hover { border-color: var(--accent); color: white; }

        .copy-btn {
            background: var(--accent); color: white; border: none; border-radius: 12px;
            font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 0.9rem;
        }
        .copy-btn:hover { background: #cc0000; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,0,0,0.3); }

        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 30px; }

        .card {
            background: #2a2a2a; padding: 20px; border-radius: 15px; border: 1px solid var(--border);
            height: 400px; display: flex; flex-direction: column;
        }

        .canvas-wrapper { position: relative; flex-grow: 1; width: 100%; height: 100%; }

        .table-wrapper { 
            overflow-x: auto; max-height: 400px; border: 1px solid var(--border); 
            border-radius: 12px; background: #2a2a2a; margin-top: 20px;
        }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { background: #333; position: sticky; top: 0; padding: 12px; text-align: left; color: var(--accent); z-index: 10; }
        td { padding: 10px; border-bottom: 1px solid var(--border); color: var(--text-dim); }
        tr:hover td { background: #353535; color: white; }

        #tabsContainer { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; }
        .tab-btn {
            background: #333; color: #888; border: none; padding: 8px 15px; 
            border-radius: 8px; cursor: pointer; font-size: 0.8rem; transition: 0.3s;
        }
        .tab-btn.active { background: var(--accent); color: white; }
        .tab-btn:hover:not(.active) { background: #444; color: white; }
        
        .flag-img { width: 24px; height: auto; margin-right: 8px; vertical-align: middle; border-radius: 2px; }

        /* NUEVOS ESTILOS PARA LA LEYENDA HTML DEL GRÁFICO DE LÍNEAS */
        .custom-legend { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin-bottom: 10px; }
        .legend-item { display: flex; align-items: center; font-size: 13px; color: #fff; cursor: pointer; transition: 0.2s; user-select: none; }
        .legend-item:hover { opacity: 0.8; }
        .legend-item.hidden-dataset { text-decoration: line-through; color: #666; opacity: 0.5; }
        .legend-color { width: 12px; height: 12px; border-radius: 3px; margin-right: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Geografía y Mercados</h1>
    <p class="subtitle">Análisis de Audiencia Global | whoisolivasx</p>

    <div class="controls">
        <div class="upload-section" id="dropZone">
            <span>📁 Arrastrar Reporte de Ubicación Geográfica (.xlsx)</span>
            <input type="file" id="fileInput" accept=".xlsx" style="display: none;">
        </div>
        <button class="copy-btn" id="copyAiBtn" style="display:none;" onclick="copyForAI()">🚀 ANALIZAR MERCADOS CON IA</button>
    </div>

    <div class="dashboard-grid" id="dashboardSection" style="display:none;">
        <div class="card">
            <h3 style="color: var(--accent); margin-bottom: 15px; font-size: 0.9rem;">TOP 10 PAÍSES POR VISUALIZACIONES</h3>
            <div class="canvas-wrapper"><canvas id="barChart"></canvas></div>
        </div>
        <div class="card">
            <h3 style="color: var(--accent); margin-bottom: 15px; font-size: 0.9rem;">EVOLUCIÓN TOP 5 PAÍSES EN EL TIEMPO</h3>
            <div id="customLegend" class="custom-legend"></div>
            <div class="canvas-wrapper"><canvas id="lineChart"></canvas></div>
        </div>
    </div>

    <div id="tabsContainer"></div>

    <div id="tableArea" class="table-wrapper">
        <div style="text-align:center; padding:100px; color:var(--text-dim);">Sube los datos para descubrir dónde está tu audiencia.</div>
    </div>
</div>

<script src="menufijo.js"></script>

<script>
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    let workbookData = {};
    let charts = { bar: null, line: null };

    // API de internacionalización
    const regionNames = new Intl.DisplayNames(['es'], { type: 'region' });

    function getCountryName(countryCode) {
        if (!countryCode || countryCode.trim() === 'Total') return 'Total General';
        try {
            return regionNames.of(countryCode.trim().toUpperCase());
        } catch (e) {
            return countryCode; 
        }
    }

    // Imágenes para la tabla HTML
    function getFlagImg(countryCode) {
        if (!countryCode || countryCode.trim() === 'Total') return '🌍';
        countryCode = countryCode.trim();
        if(countryCode.length !== 2) return '📍'; 
        return `<img src="https://flagcdn.com/w20/${countryCode.toLowerCase()}.png" class="flag-img" alt="${countryCode}">`;
    }

    // CACHÉ DE IMÁGENES PARA EL CANVAS (Gráfico de barras)
    const imageCache = {};
    function getPreloadedImage(countryCode, chartInstance) {
        if (!countryCode || countryCode.trim() === 'Total') return null;
        const code = countryCode.trim().toLowerCase();
        if (code.length !== 2) return null;
        
        if (!imageCache[code]) {
            const img = new Image();
            img.src = `https://flagcdn.com/w20/${code}.png`;
            img.onload = () => {
                if(chartInstance) chartInstance.update();
            };
            imageCache[code] = img;
        }
        return imageCache[code];
    }

    dropZone.onclick = () => fileInput.click();
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = '#ff0000'; dropZone.style.background = '#3a1a1a'; });
    dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = 'var(--border)'; dropZone.style.background = '#2a2a2a'; });
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = 'var(--border)';
        dropZone.style.background = '#2a2a2a';
        const file = e.dataTransfer.files[0];
        if (file && file.name.endsWith('.xlsx')) processExcel(file);
        else alert('Por favor, arrastra un archivo .xlsx válido.');
    });

    function processExcel(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array', raw: false });
            workbookData = {};
            workbook.SheetNames.forEach(name => {
                const cleanName = name.replace(" (Tabla)", "");
                workbookData[cleanName] = XLSX.utils.sheet_to_json(workbook.Sheets[name], { header: 1 });
            });
            createTabs();
            renderCharts();
            switchSheet(Object.keys(workbookData)[0]);
            document.getElementById('dashboardSection').style.display = 'grid';
            document.getElementById('copyAiBtn').style.display = 'block';
        };
        reader.readAsArrayBuffer(file);
    }

    function createTabs() {
        const container = document.getElementById('tabsContainer');
        container.innerHTML = '';
        Object.keys(workbookData).forEach(name => {
            const btn = document.createElement('button');
            btn.className = 'tab-btn';
            btn.innerText = name;
            btn.onclick = () => switchSheet(name, btn);
            container.appendChild(btn);
        });
        if(container.firstChild) container.firstChild.classList.add('active');
    }

    function switchSheet(name, btn) {
        if(btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        renderTable(workbookData[name]);
    }

    function renderTable(data) {
        if (!data || data.length === 0) return;
        let html = '<table><thead><tr>';
        data[0].forEach(h => html += `<th>${h || ''}</th>`);
        html += '</tr></thead><tbody>';
        
        for (let i = 1; i < data.length; i++) {
            if(data[i].length > 0 && data[i][0]) {
                html += '<tr>';
                data[i].forEach((cell, index) => {
                    if ((index === 0 || index === 1) && typeof cell === 'string' && (cell.trim().length === 2 || cell.trim() === 'Total')) {
                        const countryName = getCountryName(cell);
                        html += `<td style="font-weight:bold; color:white;">${getFlagImg(cell)} ${countryName}</td>`;
                    } else {
                        html += `<td>${cell !== undefined ? cell : '0'}</td>`;
                    }
                });
                html += '</tr>';
            }
        }
        document.getElementById('tableArea').innerHTML = html + '</tbody></table>';
    }

    // PLUGIN DEL GRÁFICO DE BARRAS
    const flagImagePlugin = {
        id: 'flagImagePlugin',
        afterDraw: (chart) => {
            if (chart.config.type !== 'bar') return;
            const ctx = chart.ctx;
            const xAxis = chart.scales.x;
            
            chart.data.labels.forEach((label, index) => {
                const code = chart.data.countryCodes[index];
                const img = getPreloadedImage(code, chart);
                
                if (img && img.complete && img.naturalWidth !== 0) {
                    const x = xAxis.getPixelForTick(index);
                    const y = xAxis.top + 8; 
                    ctx.drawImage(img, x - 10, y, 20, 15);
                }
            });
        }
    };

    // GENERADOR DE LEYENDA HTML (La magia para el gráfico de líneas)
    function buildCustomLegend(chart) {
        const container = document.getElementById('customLegend');
        container.innerHTML = '';
        
        chart.data.datasets.forEach((dataset, index) => {
            const item = document.createElement('div');
            item.className = 'legend-item';
            
            // Color de la línea
            const colorBox = document.createElement('div');
            colorBox.className = 'legend-color';
            colorBox.style.backgroundColor = dataset.borderColor;
            
            // Imagen de la bandera
            const flagImg = document.createElement('img');
            flagImg.src = `https://flagcdn.com/w20/${dataset.countryCode.toLowerCase()}.png`;
            flagImg.style.width = '16px';
            flagImg.style.marginRight = '6px';
            flagImg.style.borderRadius = '2px';
            flagImg.style.verticalAlign = 'middle';
            
            // Texto del país
            const text = document.createTextNode(dataset.label);
            
            item.appendChild(colorBox);
            item.appendChild(flagImg);
            item.appendChild(text);
            
            // Funcionalidad de ocultar/mostrar al hacer click (igual que la leyenda original)
            item.onclick = () => {
                const isHidden = chart.getDatasetMeta(index).hidden;
                chart.getDatasetMeta(index).hidden = !isHidden;
                item.classList.toggle('hidden-dataset', !isHidden);
                chart.update();
            };
            
            container.appendChild(item);
        });
    }

    function renderCharts() {
        const tableDataSheet = workbookData["Datos de la tabla"];
        const chartDataSheet = workbookData["Datos del gráfico"];

        if (tableDataSheet) {
            const ctxBar = document.getElementById('barChart').getContext('2d');
            if (charts.bar) charts.bar.destroy();

            const topCountries = tableDataSheet.slice(1)
                .filter(r => r.length > 0 && r[0] && r[0] !== 'Total')
                .sort((a, b) => {
                    let valA = parseFloat(String(a[1]).replace(/,/g, '')) || 0;
                    let valB = parseFloat(String(b[1]).replace(/,/g, '')) || 0;
                    return valB - valA;
                })
                .slice(0, 10);

            const labels = topCountries.map(r => getCountryName(r[0]));
            const codes = topCountries.map(r => r[0]);
            const views = topCountries.map(r => parseFloat(String(r[1]).replace(/,/g, '')) || 0);

            charts.bar = new Chart(ctxBar, {
                type: 'bar',
                data: {
                    labels: labels,
                    countryCodes: codes,
                    datasets: [{
                        label: 'Visualizaciones Totales',
                        data: views,
                        backgroundColor: '#ff0000',
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { ticks: { padding: 28, color: '#fff', font: { size: 12 } }, grid: { display: false } },
                        y: { ticks: { color: '#888' }, grid: { color: 'rgba(255,255,255,0.05)' } }
                    }
                },
                plugins: [flagImagePlugin] 
            });
        }

        if (chartDataSheet && tableDataSheet) {
            const ctxLine = document.getElementById('lineChart').getContext('2d');
            if (charts.line) charts.line.destroy();

            const top5Codes = tableDataSheet.slice(1)
                .filter(r => r.length > 0 && r[0] && r[0] !== 'Total')
                .sort((a, b) => {
                    let valA = parseFloat(String(a[1]).replace(/,/g, '')) || 0;
                    let valB = parseFloat(String(b[1]).replace(/,/g, '')) || 0;
                    return valB - valA;
                })
                .slice(0, 5)
                .map(r => r[0]);

            const validRows = chartDataSheet.slice(1).filter(r => r.length > 0 && r[0] && r[1]);
            const dates = [...new Set(validRows.map(r => r[0]))].sort();

            const colors = ['#ff0000', '#87CEEB', '#FFD700', '#32CD32', '#FF69B4'];
            const datasets = top5Codes.map((countryCode, index) => {
                const dataPts = dates.map(date => {
                    const row = validRows.find(r => r[0] === date && r[1] === countryCode);
                    if (row) {
                        let val = String(row[2]).replace(/,/g, '');
                        return parseFloat(val) || 0;
                    }
                    return 0;
                });
                return {
                    label: getCountryName(countryCode), // Solo el nombre limpio
                    countryCode: countryCode, // Inyectamos el código para la leyenda HTML
                    data: dataPts,
                    borderColor: colors[index],
                    backgroundColor: 'transparent',
                    borderWidth: 2,
                    tension: 0.4,
                    pointRadius: 2,
                    pointHoverRadius: 6
                };
            });

            charts.line = new Chart(ctxLine, {
                type: 'line',
                data: { labels: dates, datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: { 
                        // APAGAMOS LA LEYENDA NATIVA DE CHART.JS
                        legend: { display: false }, 
                        tooltip: { backgroundColor: 'rgba(20,20,20,0.9)', titleColor: '#fff', bodyColor: '#aaa' }
                    },
                    scales: {
                        x: { ticks: { color: '#888', maxTicksLimit: 15 }, grid: { color: 'rgba(255,255,255,0.05)' } },
                        y: { ticks: { color: '#888' }, grid: { color: 'rgba(255,255,255,0.05)' }, beginAtZero: true }
                    }
                }
            });

            // CONSTRUIMOS NUESTRA LEYENDA HTML CON BANDERAS
            buildCustomLegend(charts.line);
        }
    }

    function copyForAI() {
        if (Object.keys(workbookData).length === 0) {
            alert("Por favor, sube un archivo primero.");
            return;
        }

        let promptText = `Actúa como un Consultor de Expansión Internacional y Estrategia de Crecimiento Global en YouTube.
            Analiza detalladamente los siguientes datos geográficos de mi canal "whoisolivasx". Mi contenido consiste en videoensayos profundos, con una estética cuidada y temas de filosofía, estoicismo y análisis cultural.

            Los datos incluyen el desglose por países (Visualizaciones, Tiempo de visualización y Suscriptores ganados) y la evolución de estos mercados en el tiempo.

            TU OBJETIVO Y ENTREGABLES:
            1. Mapa de Valor Comercial (RPM): Clasifica mis 3 mercados principales. ¿Son mercados de "Alto Valor" (como España, EE.UU. o Chile) o "Mercados de Volumen" (como México, Argentina o Colombia)? ¿Cómo afecta esta distribución a mis ingresos por publicidad y qué marcas internacionales encajarían con este perfil geográfico?
            2. Índice de Fidelidad por Región: Calcula qué país tiene el mejor ratio de "Suscriptores vs. Visualizaciones". Si un país con menos vistas me está dando más suscriptores proporcionalmente, significa que mi mensaje resuena más fuerte ahí. ¿Cómo puedo "atacar" más ese mercado específico?
            3. Estrategia de Lanzamiento Global (Prime Time): Basado en la concentración de mi audiencia, sugiéreme la hora exacta (en UTC) para publicar mis videos y mis publicaciones de Comunidad para atrapar el "Prime Time" simultáneo de mis dos regiones más grandes.
            4. Adaptación Cultural y Lingüística: Dado que hago videoensayos, ¿debería incluir modismos de mi país principal o me conviene estandarizar mi guion a un "Español Neutro Internacional" para facilitar la retención en los mercados secundarios?
            5. Plan de Conquista de Mercado: Identifica un país que esté en mi "Top 10" pero no en mi "Top 3" que tenga alto potencial. Dame 3 pasos para crear contenido que lo impulse a los primeros lugares.

            Responde de forma ejecutiva, directa y con consejos que pueda aplicar hoy mismo en mi estrategia de exportación de contenido.

            AQUÍ ESTÁN LOS DATOS GEOGRÁFICOS DE MI AUDIENCIA:
            `;

        let fullText = promptText;
        
        // Extraemos los datos de TODAS las hojas (Tabla, Gráfico y Totales)
        for (let sheetName in workbookData) {
            fullText += `\n\n--- [HOJA: ${sheetName}] ---\n`;
            workbookData[sheetName].forEach(row => {
                if(row.length > 0 && row[0]) {
                    fullText += row.join("\t") + "\n";
                }
            });
        }

        navigator.clipboard.writeText(fullText).then(() => {
            alert("🚀 ¡PROMPT GEOGRÁFICO COPIADO! Pégalo en Gemini para recibir tu estrategia de expansión global.");
        });
    }
</script>
</body>
</html>
